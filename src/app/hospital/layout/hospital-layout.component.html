<div class="layout-container" [class.sidebar-collapsed]="isSidebarCollapsed">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        <span class="logo-text">HemoLink <span class="badge">HOSPITAL</span></span>
      </div>
      <button class="toggle-btn" (click)="toggleSidebar()">
        <svg xmlns="http://www.w3.org/2001/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/hospital/overview" routerLinkActive="active" class="nav-item">
        <svg xmlns="http://www.w3.org/2001/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Tableau de bord</span>
      </a>

      <div class="nav-section">Besoins en Sang</div>

      <a routerLink="/hospital/orders" routerLinkActive="active" class="nav-item">
        <svg xmlns="http://www.w3.org/2001/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v3"/><path d="m3 10 18 0"/><path d="M5 10v11a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V10"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>
        <span>Mes Commandes</span>
      </a>

      <a routerLink="/hospital/create-order" routerLinkActive="active" class="nav-item">
        <svg xmlns="http://www.w3.org/2001/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        <span>Demande de Sang</span>
      </a>

      <div class="nav-section">Établissement</div>

      <a routerLink="/hospital/profile" routerLinkActive="active" class="nav-item">
        <svg xmlns="http://www.w3.org/2001/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profil Hôpital</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <svg xmlns="http://www.w3.org/2001/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Déconnexion</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <h2 class="page-title">Espace Hôpital</h2>
      </div>

      <div class="topbar-right">
        <!-- Profile Chip -->
        <div class="profile-chip">
          <div class="avatar">
            {{ user?.prenom?.charAt(0) || 'H' }}{{ user?.nom?.charAt(0) || 'P' }}
          </div>
          <div class="user-info">
            <span class="user-name">{{ user?.prenom || 'Personnel' }} {{ user?.nom || 'Hospitalier' }}</span>
            <span class="user-role">Hôpital</span>
          </div>
        </div>
      </div>
    </header>

    <div class="content-scroll">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>

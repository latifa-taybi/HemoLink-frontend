<div class="map-page">
  <!-- Page Header -->
  <div class="page-header">
    <div>
      <h1 class="page-title">Centres de collecte</h1>
      <p class="page-sub">Trouvez le centre de don le plus proche de chez vous ou de votre lieu de travail.</p>
    </div>
  </div>

  <div class="map-layout">
    <!-- Split Pane: List -->
    <div class="centers-list">
      <div class="list-header">
        Centres disponibles
        <span class="list-count" *ngIf="!loading">{{ centers.length }}</span>
      </div>

      <!-- Loading State for List -->
      <div class="centers-scroll" *ngIf="loading" style="display: flex; align-items: center; justify-content: center;">
        <div class="spinner"></div>
      </div>

      <!-- Centers List -->
      <div class="centers-scroll" *ngIf="!loading">
        <div class="center-item" *ngFor="let center of centers" (click)="centerOn(center)">
          <div class="center-name">{{ center.nom }}</div>
          <div class="center-meta">
            <span class="center-dot"></span> {{ center.ville }}
          </div>
          <div class="center-actions">
            <!-- Focus Map -->
            <button class="btn-map btn-focus" (click)="centerOn(center); $event.stopPropagation()">
              📍 Voir sur la carte
            </button>
            <!-- Book Appointment (if we had a direct route, but we'll link to Appointments view) -->
            <button class="btn-map btn-rdv" [routerLink]="['/donor/appointments']" [queryParams]="{center: center.id}">
              📅 Choisir
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Split Pane: Map -->
    <div class="map-wrapper">
      <div id="map"></div>
    </div>
  </div>
</div>

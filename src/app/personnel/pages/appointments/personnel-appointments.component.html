<div class="appointments-page">
  <div class="header-section">
    <h1>Rendez-vous du jour</h1>
    <p>Gérez les arrivées des donneurs dans votre centre.</p>
  </div>

  <div class="card table-container">
    <div *ngIf="loading" class="loader">Chargement...</div>

    <table *ngIf="!loading && rendezVous.length > 0" class="rdv-table">
      <thead>
        <tr>
          <th>Heure</th>
          <th>Donneur</th>
          <th>ID Donneur</th>
          <th>Statut</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let rdv of rendezVous" [class.row-done]="rdv.statut !== 'PLANIFIE'">
          <td><strong>{{ rdv.dateRendezVous | date:'HH:mm' }}</strong></td>
          <td>{{ rdv.donneurPrenom }} {{ rdv.donneurNom }}</td>
          <td class="donor-id">#{{ rdv.donneurId }}</td>
          <td>
            <span class="badge" 
              [class.badge-planifie]="rdv.statut === 'PLANIFIE'"
              [class.badge-termine]="rdv.statut === 'TERMINE'"
              [class.badge-annule]="rdv.statut === 'ANNULE'">
              {{ rdv.statut }}
            </span>
          </td>
          <td class="actions-cell">
            <button *ngIf="rdv.statut === 'PLANIFIE'" class="btn-icon btn-success" (click)="marquerPresent(rdv)">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
              Présent
            </button>
            <button *ngIf="rdv.statut === 'PLANIFIE'" class="btn-icon btn-danger" (click)="marquerAbsent(rdv)">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
              Absent
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <div *ngIf="!loading && rendezVous.length === 0" class="empty-state">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="m9 16 2 2 4-4"/></svg>
      <p>Aucun rendez-vous pour le moment.</p>
    </div>
  </div>
</div>

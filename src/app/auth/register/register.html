<div class="min-h-screen bg-gradient-to-br from-red-50 to-red-100 flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-lg shadow-lg p-8">
      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-red-600 mb-2">HemoLink</h1>
        <p class="text-gray-600">S'inscrire</p>
      </div>

      <!-- Error Message -->
      <div *ngIf="error" class="mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded text-sm">
        {{ error }}
      </div>

      <!-- Register Form -->
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <div class="grid grid-cols-2 gap-3">
          <!-- Prénom -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Prénom</label>
            <input
              type="text"
              formControlName="prenom"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500"
              placeholder="Jean"
            />
            <div *ngIf="prenom?.invalid && prenom?.touched" class="mt-1 text-xs text-red-600">
              <p *ngIf="prenom?.errors?.['required']">Requis</p>
              <p *ngIf="prenom?.errors?.['minlength']">Min 2 car.</p>
            </div>
          </div>

          <!-- Nom -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Nom</label>
            <input
              type="text"
              formControlName="nom"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500"
              placeholder="Dupont"
            />
            <div *ngIf="nom?.invalid && nom?.touched" class="mt-1 text-xs text-red-600">
              <p *ngIf="nom?.errors?.['required']">Requis</p>
              <p *ngIf="nom?.errors?.['minlength']">Min 2 car.</p>
            </div>
          </div>
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
          <input
            type="email"
            formControlName="email"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500"
            placeholder="votre@email.com"
          />
          <div *ngIf="email?.invalid && email?.touched" class="mt-1 text-sm text-red-600">
            <p *ngIf="email?.errors?.['required']">L'email est requis</p>
            <p *ngIf="email?.errors?.['email']">Email invalide</p>
          </div>
        </div>

        <!-- Téléphone -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Téléphone (optionnel)</label>
          <input
            type="tel"
            formControlName="telephone"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500"
            placeholder="+212 6 12 34 56 78"
          />
        </div>

        <!-- Mot de passe -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Mot de passe</label>
          <input
            type="password"
            formControlName="motDePasse"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500"
            placeholder="••••••••"
          />
          <div *ngIf="motDePasse?.invalid && motDePasse?.touched" class="mt-1 text-sm text-red-600">
            <p *ngIf="motDePasse?.errors?.['required']">Le mot de passe est requis</p>
            <p *ngIf="motDePasse?.errors?.['minlength']">Au minimum 6 caractères</p>
          </div>
        </div>

        <!-- Confirmer mot de passe -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Confirmer mot de passe</label>
          <input
            type="password"
            formControlName="confirmPassword"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500"
            placeholder="••••••••"
          />
          <div *ngIf="passwordMismatch" class="mt-1 text-sm text-red-600">
            <p>Les mots de passe ne correspondent pas</p>
          </div>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="loading || registerForm.invalid"
          class="w-full mt-6 py-2 px-4 bg-red-600 text-white font-semibold rounded-lg hover:bg-red-700 disabled:bg-gray-400 transition duration-200"
        >
          {{ loading ? 'S\'inscire...' : 'S\'inscrire' }}
        </button>
      </form>

      <!-- Divider -->
      <div class="my-6 flex items-center">
        <div class="flex-1 border-t border-gray-300"></div>
        <span class="px-3 text-gray-500 text-sm">ou</span>
        <div class="flex-1 border-t border-gray-300"></div>
      </div>

      <!-- Login Link -->
      <div class="text-center">
        <p class="text-gray-600 text-sm">
          Vous avez un compte ?
          <a routerLink="/auth/login" class="text-red-600 font-semibold hover:text-red-700">Se connecter</a>
        </p>
      </div>
    </div>
  </div>
</div>

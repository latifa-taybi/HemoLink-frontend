<div class="min-h-screen bg-gradient-to-br from-red-50 to-red-100 flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-lg shadow-lg p-8">
      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-red-600 mb-2">HemoLink</h1>
        <p class="text-gray-600">Connexion</p>
      </div>

      <!-- Error Message -->
      <div *ngIf="error" class="mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded text-sm">
        {{ error }}
      </div>

      <!-- Success Message -->
      <div *ngIf="success" class="mb-4 p-4 bg-green-100 border border-green-400 text-green-700 rounded text-sm">
        {{ success }}
      </div>

      <!-- Info Message -->
      <div class="mb-4 p-4 bg-blue-50 border border-blue-200 text-blue-700 rounded text-xs">
        <p class="font-semibold mb-1">Admin de démo :</p>
        <p>Email: admin@hemolink.local</p>
        <p>Mot de passe: Admin@123</p>
      </div>

      <!-- Login Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <!-- Email Input -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
          <input
            type="email"
            formControlName="email"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500"
            placeholder="votre@email.com"
          />
          <div *ngIf="email?.invalid && email?.touched" class="mt-1 text-sm text-red-600">
            <p *ngIf="email?.errors?.['required']">L'email est requis</p>
            <p *ngIf="email?.errors?.['email']">Email invalide</p>
          </div>
        </div>

        <!-- Password Input -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Mot de passe</label>
          <input
            type="password"
            formControlName="password"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500"
            placeholder="••••••••"
          />
          <div *ngIf="password?.invalid && password?.touched" class="mt-1 text-sm text-red-600">
            <p *ngIf="password?.errors?.['required']">Le mot de passe est requis</p>
            <p *ngIf="password?.errors?.['minlength']">Au minimum 6 caractères</p>
          </div>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="loading || loginForm.invalid"
          class="w-full mt-6 py-2 px-4 bg-red-600 text-white font-semibold rounded-lg hover:bg-red-700 disabled:bg-gray-400 transition duration-200"
        >
          {{ loading ? 'Connexion...' : 'Se connecter' }}
        </button>
      </form>

      <!-- Divider -->
      <div class="my-6 flex items-center">
        <div class="flex-1 border-t border-gray-300"></div>
        <span class="px-3 text-gray-500 text-sm">ou</span>
        <div class="flex-1 border-t border-gray-300"></div>
      </div>

      <!-- Sign Up Link -->
      <div class="text-center">
        <p class="text-gray-600 text-sm">
          Pas de compte ?
          <a routerLink="/auth/register" class="text-red-600 font-semibold hover:text-red-700">S'inscrire</a>
        </p>
      </div>
    </div>
  </div>
</div>

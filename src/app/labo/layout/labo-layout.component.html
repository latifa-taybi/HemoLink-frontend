<div class="layout-container" [class.sidebar-collapsed]="isSidebarCollapsed">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2001/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        <span class="logo-text">HemoLink <span class="badge">LABO</span></span>
      </div>
      <button class="toggle-btn" (click)="toggleSidebar()">
        <svg xmlns="http://www.w3.org/2001/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/labo/overview" routerLinkActive="active" class="nav-item">
        <svg xmlns="http://www.w3.org/2001/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Tableau de bord</span>
      </a>

      <div class="nav-section">Processus & Traitement</div>

      <a routerLink="/labo/create-bags" routerLinkActive="active" class="nav-item">
        <svg xmlns="http://www.w3.org/2001/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 22H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v7"/><path d="M14 14.5v3.5l3.5-3.5h-3.5z"/><path d="M19.5 22h-5l5-5v5z"/></svg>
        <span>Séparation des dons</span>
      </a>

      <a routerLink="/labo/tests" routerLinkActive="active" class="nav-item">
        <svg xmlns="http://www.w3.org/2001/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11a3 3 0 1 0 6 0c0-1.66-3-6-3-6s-3 4.34-3 6z"/><path d="M12 22a8 8 0 1 0 0-16"/></svg>
        <span>Qualification Biologique</span>
      </a>

      <div class="nav-section">Administration</div>

      <a routerLink="/labo/inventory" routerLinkActive="active" class="nav-item">
        <svg xmlns="http://www.w3.org/2001/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        <span>Inventaire Poches</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <svg xmlns="http://www.w3.org/2001/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Déconnexion</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <h2 class="page-title">Espace Laboratoire</h2>
      </div>

      <div class="topbar-right">
        <!-- Profile Chip -->
        <div class="profile-chip">
          <div class="avatar">
            {{ user?.prenom?.charAt(0) || 'L' }}{{ user?.nom?.charAt(0) || 'T' }}
          </div>
          <div class="user-info">
            <span class="user-name">{{ user?.prenom || 'Technicien' }} {{ user?.nom || 'Labo' }}</span>
            <span class="user-role">Laboratoire</span>
          </div>
        </div>
      </div>
    </header>

    <div class="content-scroll">
      <!-- Routing for Laboratory tools -->
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
